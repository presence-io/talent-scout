name: Publish to npm

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Check (typecheck + lint + format + test)
        run: pnpm check

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          pnpm -r exec -- npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm -r run build

      - name: Publish packages
        run: |
          pnpm --filter @talent-scout/shared publish --access public --no-git-checks
          pnpm --filter @talent-scout/data-collector publish --access public --no-git-checks
          pnpm --filter @talent-scout/data-processor publish --access public --no-git-checks
          pnpm --filter @talent-scout/ai-evaluator publish --access public --no-git-checks
          pnpm --filter @talent-scout/skills publish --access public --no-git-checks
          pnpm --filter @talent-scout/dashboard publish --access public --no-git-checks
