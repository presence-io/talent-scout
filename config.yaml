# ── 代码搜索：证明在用（最强信号）──
code_signals:
  - filename: "CLAUDE.md"
    path: "/"
    weight: 5.0
    label: "claude-code-user"
  - filename: ".cursorrules"
    path: "/"
    weight: 3.0
    label: "cursor-user"
  - filename: ".clinerules"
    path: "/"
    weight: 3.0
    label: "cline-user"

# ── Commit 签名搜索 ──
commit_queries:
  - query: '"Co-Authored-By: Claude"'
    weight: 5.0
  - query: '"Co-Authored-By: Claude Opus"'
    weight: 5.0
  - query: '"Generated with Claude"'
    weight: 4.0

# ── Topic 搜索：主动建设者 ──
topic_queries:
  - topic: "claude-code"
    weight: 4.0
  - topic: "mcp-server"
    weight: 4.0
  - topic: "mcp"
    weight: 2.0
    max_pages: 3

# ── 中文社区快捷通道 ──
chinese_community:
  - owner: yzfly
    repo: Awesome-MCP-ZH
    type: stargazers
    weight: 3.0
    max_pages: 10
  - owner: hesreallyhim
    repo: awesome-claude-code
    type: forks
    weight: 2.0
    max_pages: 5

# ── 头部 repo stargazers（量大信号弱）──
stargazer_repos:
  - { owner: anthropics, repo: claude-code, weight: 1.5, max_pages: 10 }
  - { owner: cline, repo: cline, weight: 1.0, max_pages: 5 }
  - { owner: aider-ai, repo: aider, weight: 1.0, max_pages: 5 }
  - { owner: punkpeye, repo: awesome-mcp-servers, weight: 1.0, max_pages: 5 }

# ── 中国 location 关键词 ──
location_keywords:
  - "china"
  - "beijing"
  - "shanghai"
  - "shenzhen"
  - "hangzhou"
  - "guangzhou"
  - "chengdu"
  - "nanjing"
  - "wuhan"
  - "北京"
  - "上海"
  - "深圳"
  - "杭州"
  - "中国"
  - "广州"
  - "成都"
  - "南京"
  - "武汉"
  - "xi'an"
  - "西安"

preferred_locations:
  - { pattern: "beijing|北京", bonus: 3.0 }
  - { pattern: "shanghai|上海", bonus: 3.0 }

# ── API 预算 ──
api_budget:
  max_total_calls: 1500
  search_pages_per_query: 10
  profile_batch_size: 500
  search_sleep: 2.5        # seconds between search API calls (30/min limit)

# ── AI 评估 ──
ai_eval:
  model: "claude-sonnet-4-20250514"
  batch_size: 20            # candidates per API call
  max_batches: 30           # 30 × 20 = 600 candidates max
