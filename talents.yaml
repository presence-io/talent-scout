# ── Code signals: filenames that indicate AI tool usage ──
code_signals:
  - filename: CLAUDE.md
    path: /CLAUDE.md
    weight: 5
    label: "code:claude-md"
  - filename: .cursorrules
    path: /.cursorrules
    weight: 5
    label: "code:cursor-rules"
  - filename: .cursor/rules
    path: /.cursor/rules
    weight: 5
    label: "code:cursor-rules-dir"
  - filename: copilot-instructions.md
    path: /.github/copilot-instructions.md
    weight: 4
    label: "code:copilot-instructions"

# ── Commit search queries ──
commit_queries:
  - query: "claude coauthor"
    weight: 5
    label: "commit:claude-coauthor"
  - query: "generated by cursor"
    weight: 4
    label: "commit:cursor-generated"
  - query: "copilot suggestion"
    weight: 3
    label: "commit:copilot-suggestion"

# ── Topic search queries ──
topic_queries:
  - topic: "claude-code"
    weight: 5
    max_pages: 10
  - topic: "cursor-ai"
    weight: 5
    max_pages: 10
  - topic: "ai-coding"
    weight: 3
    max_pages: 5

# ── Chinese dev community repos ──
chinese_community:
  - owner: vuejs
    repo: core
    type: contributors
    weight: 3
    max_pages: 5
  - owner: nicepkg
    repo: aide
    type: stargazers
    weight: 4
    max_pages: 5

# ── Stargazer repos for AI tool indicators ──
stargazer_repos:
  - owner: anthropics
    repo: claude-code
    weight: 5
    max_pages: 10

# ── Graph expansion settings ──
graph_expansion:
  enabled: true
  max_seed_users: 200
  max_followers_per_user: 100
  max_depth: 1
  min_seed_confidence: 0.7

# ── API rate limiting ──
api_budget:
  max_total_calls: 2000
  search_pages_per_query: 10
  profile_batch_size: 500
  search_sleep_ms: 2500

# ── Identity configuration ──
identity:
  min_confidence: 0.5
  ai_assist_range: [0.3, 0.7]

# ── Evaluation thresholds ──
evaluation:
  shortlist_min_score: 3.0
  activity_threshold: 10
  activity_penalty: -3.0

# ── Target profile for fit scoring ──
target_profile:
  preferred_cities: []
  preferred_languages:
    - TypeScript
    - Python
    - Rust
    - Go

# ── Cache TTL (seconds) ──
cache:
  ttl:
    user_profile: 604800
    user_repos: 259200
    search_results: 86400
    events: 43200
    rankings: 2592000

# ── OpenClaw integration ──
openclaw:
  agents:
    identity:
      name: talent-identity
      workspace: ./packages/data-processor
      timeout: 120
    evaluator:
      name: talent-evaluator
      workspace: ./packages/ai-evaluator
      timeout: 180
  batch_size: 10
  cron:
    - name: talent-collect
      schedule: "0 1 * * *"
      command: "cd {{project_dir}} && pnpm --filter @talent-scout/data-collector run collect"
      description: "Daily data collection"
    - name: talent-process
      schedule: "0 3 * * *"
      command: "cd {{project_dir}} && pnpm --filter @talent-scout/data-processor run process"
      description: "Daily data processing"
    - name: talent-evaluate
      schedule: "0 5 * * 1"
      command: "cd {{project_dir}} && pnpm --filter @talent-scout/ai-evaluator run evaluate"
      description: "Weekly AI evaluation"
    - name: talent-seeds
      schedule: "0 0 1 * *"
      command: "cd {{project_dir}} && pnpm --filter @talent-scout/data-collector run collect --source rankings"
      description: "Monthly ranking seed update"
